<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  
  /* TABS */
  .tab-bar { display: flex; background: #1e293b; border-bottom: 2px solid #334155; position: sticky; top: 0; z-index: 100; }
  .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 0.8rem; font-weight: 700; color: #64748b; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em; }
  .tab.active { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SHOPPING LIST */
  .section { margin: 0; }
  .section-header { background: #1e293b; padding: 12px 16px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; position: sticky; top: 54px; z-index: 50; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #334155; }
  .section-header .icon { font-size: 1.1rem; }
  .section-header .count { margin-left: auto; background: #334155; color: #94a3b8; border-radius: 10px; padding: 2px 8px; font-size: 0.65rem; }
  .item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: background 0.1s; }
  .item:active { background: #1e293b; }
  .item.done { opacity: 0.35; }
  .item.done .item-name { text-decoration: line-through; }
  .checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #475569; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .item.done .checkbox { background: #22c55e; border-color: #22c55e; }
  .checkbox::after { content: '✓'; color: white; font-size: 0.75rem; display: none; font-weight: 800; }
  .item.done .checkbox::after { display: block; }
  .item-name { font-size: 0.9rem; flex: 1; }
  .item-qty { font-size: 0.75rem; color: #64748b; flex-shrink: 0; }
  .progress-bar { height: 4px; background: #1e293b; position: sticky; top: 54px; z-index: 60; }
  .progress-fill { height: 100%; background: #22c55e; transition: width 0.3s; }
  .progress-text { text-align: center; padding: 10px; font-size: 0.75rem; color: #64748b; }
  .clear-btn { display: block; margin: 16px; padding: 12px; background: #1e293b; border: 1px solid #334155; color: #64748b; border-radius: 8px; font-size: 0.8rem; cursor: pointer; text-align: center; }

  /* MEAL PLAN */
  .meal-plan { padding: 12px; }
  .week-title { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; padding: 12px 4px 8px; border-bottom: 1px solid #334155; margin-bottom: 8px; }
  .day-card { background: #1e293b; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
  .day-header { padding: 10px 12px; background: #263548; display: flex; justify-content: space-between; align-items: center; }
  .day-name { font-weight: 700; font-size: 0.85rem; }
  .day-date { font-size: 0.7rem; color: #64748b; }
  .meals { padding: 8px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meal { padding: 8px; border-radius: 6px; }
  .meal.dinner { background: #1a2535; border-left: 3px solid #3b82f6; }
  .meal.lunch { background: #1a2535; border-left: 3px solid #f59e0b; }
  .meal-type { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 3px; }
  .meal-name { font-size: 0.78rem; font-weight: 600; line-height: 1.3; }
  .protein-tag { display: inline-block; font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; margin-top: 3px; font-weight: 700; }
  .tag-s { background: #7f1d1d; color: #fca5a5; }
  .tag-c { background: #78350f; color: #fcd34d; }
  .tag-f { background: #0c4a6e; color: #7dd3fc; }

  /* RECIPES */
  .recipes { padding: 12px; }
  .recipe-card { background: #1e293b; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .recipe-header { padding: 12px 14px; background: #263548; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .recipe-title { font-weight: 700; font-size: 0.9rem; }
  .recipe-meta { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
  .recipe-toggle { color: #64748b; font-size: 1.2rem; transition: transform 0.2s; }
  .recipe-toggle.open { transform: rotate(180deg); }
  .recipe-body { display: none; padding: 12px 14px; }
  .recipe-body.open { display: block; }
  .recipe-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #3b82f6; margin: 10px 0 6px; letter-spacing: 0.05em; }
  .ingredient-list { list-style: none; }
  .ingredient-list li { font-size: 0.82rem; padding: 4px 0; border-bottom: 1px solid #334155; display: flex; gap: 8px; }
  .ingredient-list li::before { content: '·'; color: #475569; }
  .step-list { list-style: none; counter-reset: steps; }
  .step-list li { counter-increment: steps; font-size: 0.82rem; padding: 6px 0 6px 28px; border-bottom: 1px solid #334155; position: relative; line-height: 1.4; }
  .step-list li::before { content: counter(steps); position: absolute; left: 0; top: 6px; background: #3b82f6; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
</style>

// ── RENDER SHOPPING LIST ───────────────────────────────────────
let checked = JSON.parse(localStorage.getItem('shopChecked') || '{}');

function renderList() {
  const container = document.getElementById('list-container');
  container.innerHTML = '';
  let total = 0, done = 0;
  sections.forEach(sec => {
    const header = document.createElement('div');
    header.className = 'section-header';
    const sectionDone = sec.items.filter(i => checked[i]).length;
    header.innerHTML = `<span class="icon">${sec.icon}</span>${sec.label}<span class="count">${sectionDone}/${sec.items.length}</span>`;
    container.appendChild(header);
    sec.items.forEach(item => {
      total++;
      if (checked[item]) done++;
      const el = document.createElement('div');
      el.className = 'item' + (checked[item] ? ' done' : '');
      el.innerHTML = `<div class="checkbox"></div><div class="item-name">${item}</div>`;
      el.onclick = () => {
        checked[item] = !checked[item];
        localStorage.setItem('shopChecked', JSON.stringify(checked));
        renderList();
      };
      container.appendChild(el);
    });
  });
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} of ${total} done · ${pct}%`;
}

function clearAll() {
  checked = {};
  localStorage.setItem('shopChecked', JSON.stringify(checked));
  renderList();
}

// ── RENDER MEAL PLAN ───────────────────────────────────────────
function renderMealPlan() {
  const container = document.getElementById('meal-plan-container');
  const tagMap = { s: 'tag-s', c: 'tag-c', f: 'tag-f' };
  const tagLabel = { s: '🥩 Steak', c: '🍗 Chicken', f: '🐟 Fish' };
  mealPlan.forEach(week => {
    container.innerHTML += `<div class="week-title">${week.week}</div>`;
    week.days.forEach(d => {
      container.innerHTML += `
        <div class="day-card">
          <div class="day-header">
            <span class="day-name">${d.day}</span>
            <span class="day-date">${d.date}</span>
          </div>
          <div class="meals">
            <div class="meal dinner">
              <div class="meal-type">🌙 Dinner</div>
              <div class="meal-name">${d.dinner.name}</div>
              <span class="protein-tag ${tagMap[d.dinner.tag]}">${tagLabel[d.dinner.tag]}</span>
            </div>
            <div class="meal lunch">
              <div class="meal-type">☀️ Lunch</div>
              <div class="meal-name">${d.lunch.name}</div>
              <span class="protein-tag ${tagMap[d.lunch.tag]}">${tagLabel[d.lunch.tag]}</span>
            </div>
          </div>
        </div>`;
    });
  });
}

        <ul class="ingredient-list">${r.ingredients.map(x => `<li>${x}</li>`).join('')}</ul>
        <div class="recipe-section-title">Method</div>
        <ol class="step-list">${r.steps.map(x => `<li>${x}</li>`).join('')}</ol>
      </div>`;
    container.appendChild(card);
  });
}

function toggleRecipe(i) {
  const body = document.getElementById('recipe-' + i);
  const toggle = document.getElementById('toggle-' + i);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ── TABS ───────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ── INIT ───────────────────────────────────────────────────────
renderList();
renderMealPlan();
renderRecipes();
</script>
</body>
</html>
